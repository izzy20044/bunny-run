<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Bunny Run</title>
<style>
  html, body { margin: 0; height: 100%; background: #2b2b38; display: flex; flex-direction: column; align-items: center; justify-content: center; font-family: Consolas, monospace; }
  canvas { max-width: 100vw; max-height: 100vh; image-rendering: pixelated; box-shadow: 0 8px 40px rgba(0,0,0,.5); }
  #hint { color: #aab; margin-top: 10px; font-size: 14px; }
</style>
</head>
<body>
<canvas id="game" width="900" height="420"></canvas>
<div id="hint">SPACE / UP / TAP to jump &middot; ESC to reset best</div>
<script>
"use strict";
const W = 900, H = 420, GROUND_Y = 340;
const SKY_TOP = [110,180,240], SKY_BOT = [190,225,250];
const GROUND_COL = "#6aaa5a", DIRT = "#80603e", DIRT_DARK = "#6c5032";
const INK = "#282837";

const cv = document.getElementById("game");
const ctx = cv.getContext("2d");

// ---- bunny sprite (art faces left; baked flipped to face right) ----
const BODY = [
  "..11........",
  ".121........",
  ".121..11....",
  ".1211121....",
  ".111111111..",
  ".1131111111.",
  ".1111111111.",
  "21111111111.",
  ".1111111111.",
  "..11111111..",
];
const PX = 5;
const PAL = {1:"#f5f5f5", 2:"#faaabe", 3:"#23232d"};
const BODY_W = BODY[0].length * PX, BODY_H = BODY.length * PX;
const SPR_H = BODY_H + 2 * PX;

function bakeFrame(legs) {
  const c = document.createElement("canvas");
  c.width = BODY_W; c.height = SPR_H;
  const g = c.getContext("2d");
  for (let ry = 0; ry < BODY.length; ry++)
    for (let rx = 0; rx < BODY[ry].length; rx++) {
      const ch = BODY[ry][rx];
      if (ch !== ".") { g.fillStyle = PAL[ch]; g.fillRect(rx*PX, ry*PX, PX, PX); }
    }
  g.fillStyle = PAL[1];
  g.fillRect(0, 6*PX, PX, PX); // tail
  for (const [lx, ly, lw, lh] of legs) g.fillRect(lx*PX, BODY_H + ly*PX, lw*PX, lh*PX);
  // flip horizontally so the bunny faces right
  const f = document.createElement("canvas");
  f.width = BODY_W; f.height = SPR_H;
  const fg = f.getContext("2d");
  fg.translate(BODY_W, 0); fg.scale(-1, 1); fg.drawImage(c, 0, 0);
  return f;
}
const FRAMES = [
  bakeFrame([[2,0,2,2],[8,0,2,2]]),
  bakeFrame([[1,0,2,2],[9,-1,2,2]]),
  bakeFrame([[3,-1,2,2],[7,0,2,2]]),
  bakeFrame([[3,0,3,1],[8,0,3,1]]), // jump: legs tucked
];

// ---- log sprites ----
function makeLog(w, h) {
  const c = document.createElement("canvas");
  c.width = w; c.height = h;
  const g = c.getContext("2d");
  const r = 6;
  g.fillStyle = DIRT;
  g.beginPath(); g.roundRect(0, 0, w, h, r); g.fill();
  g.strokeStyle = DIRT_DARK; g.lineWidth = 3;
  g.beginPath(); g.roundRect(1.5, 1.5, w-3, h-3, r); g.stroke();
  g.lineWidth = 2;
  for (let i = 2; i < w - 16; i += 9) {
    g.beginPath(); g.moveTo(i, 5); g.lineTo(i+3, h-5); g.stroke();
  }
  const ex = w - 10, ey = h / 2, erx = 6, ery = h/2 - 4;
  g.fillStyle = "#c4a074";
  g.beginPath(); g.ellipse(ex, ey, erx, ery, 0, 0, 7); g.fill();
  g.strokeStyle = DIRT_DARK; g.lineWidth = 2;
  g.beginPath(); g.ellipse(ex, ey, erx, ery, 0, 0, 7); g.stroke();
  g.lineWidth = 1;
  g.beginPath(); g.ellipse(ex, ey, Math.max(1,erx-3), Math.max(1,ery-4), 0, 0, 7); g.stroke();
  return c;
}

// ---- sky gradient baked once ----
const sky = document.createElement("canvas");
sky.width = W; sky.height = GROUND_Y;
{
  const g = sky.getContext("2d");
  for (let y = 0; y < GROUND_Y; y++) {
    const t = y / GROUND_Y;
    const c = SKY_TOP.map((v, i) => Math.round(v + (SKY_BOT[i]-v)*t));
    g.fillStyle = `rgb(${c[0]},${c[1]},${c[2]})`;
    g.fillRect(0, y, W, 1);
  }
}

const rnd = (a, b) => a + Math.random() * (b - a);
const rndi = (a, b) => Math.floor(rnd(a, b + 1));

function newCloud(x) {
  return { x: x !== undefined ? x : W + rnd(20, 300), y: rnd(30, 140),
           s: rnd(0.6, 1.3), v: rnd(0.25, 0.6) };
}

const G = {};
let best = +(localStorage.getItem("bunnyBest") || 0);

function reset() {
  G.bunnyX = 90; G.bunnyY = GROUND_Y; G.velY = 0; G.onGround = true;
  G.speed = 5; G.score = 0; G.dist = 0; G.animT = 0; G.dead = false;
  G.logs = []; G.nextLog = W + 200;
  G.clouds = Array.from({length: 5}, () => newCloud(rnd(0, W)));
  G.grass = Array.from({length: 40}, () => [rnd(0, W), rnd(GROUND_Y+8, H-6)]);
}
reset();

function jump() {
  if (G.onGround && !G.dead) { G.velY = -14; G.onGround = false; }
}

function spawnLog() {
  const h = rndi(26, 44), w = rndi(46, 90);
  G.logs.push({ x: W + 20, img: makeLog(w, h), w, h });
  G.nextLog = rndi(320, 620) + G.speed * 14;
}

function update(dt) {
  if (G.dead) return;
  const f = dt * 60;
  G.speed = Math.min(16, 5 + G.dist / 2200);
  const move = G.speed * f;
  G.dist += move; G.score = G.dist / 10;

  G.velY += 0.55 * f;
  G.bunnyY += G.velY * f;
  if (G.bunnyY >= GROUND_Y) { G.bunnyY = GROUND_Y; G.velY = 0; G.onGround = true; }
  G.animT += dt * (6 + G.speed * 0.8);

  for (const c of G.clouds) {
    c.x -= c.v + G.speed * 0.08;
    if (c.x < -120) Object.assign(c, newCloud());
  }
  for (const g of G.grass) g[0] = ((g[0] - move) % W + W) % W;

  G.nextLog -= move;
  if (G.nextLog <= 0) spawnLog();
  for (const l of G.logs) l.x -= move;
  G.logs = G.logs.filter(l => l.x + l.w > -10);

  const bx = G.bunnyX + 6, by = G.bunnyY - SPR_H + 6, bw = BODY_W - 12, bh = SPR_H - 8;
  for (const l of G.logs) {
    const lx = l.x + 3, ly = GROUND_Y - l.h + 3, lw = l.w - 6, lh = l.h - 3;
    if (bx < lx + lw && bx + bw > lx && by < ly + lh && by + bh > ly) {
      G.dead = true;
      best = Math.max(best, Math.floor(G.score));
      localStorage.setItem("bunnyBest", best);
      break;
    }
  }
}

function pad(n) { return String(Math.floor(n)).padStart(6, "0"); }

function draw() {
  ctx.drawImage(sky, 0, 0);
  ctx.fillStyle = "#fff";
  for (const c of G.clouds)
    for (const [dx, dy, r] of [[0,0,22],[18,-6,16],[-18,-4,15],[8,6,18],[-8,7,16]]) {
      ctx.beginPath(); ctx.arc(c.x + dx*c.s, c.y + dy*c.s, r*c.s, 0, 7); ctx.fill();
    }
  ctx.fillStyle = "#ffe68c";
  ctx.beginPath(); ctx.arc(W-80, 60, 34, 0, 7); ctx.fill();

  ctx.fillStyle = GROUND_COL; ctx.fillRect(0, GROUND_Y, W, H - GROUND_Y);
  ctx.fillStyle = "#569148"; ctx.fillRect(0, GROUND_Y - 2, W, 4);
  ctx.strokeStyle = "#468236"; ctx.lineWidth = 2;
  ctx.beginPath();
  for (const [x, y] of G.grass) { ctx.moveTo(x, y); ctx.lineTo(x, y - 5); }
  ctx.stroke();

  for (const l of G.logs) ctx.drawImage(l.img, l.x | 0, GROUND_Y - l.h);

  const frame = !G.onGround ? FRAMES[3] : FRAMES[Math.floor(G.animT) % 3];
  const fy = (G.bunnyY | 0) - SPR_H;
  if (G.dead) {
    ctx.save();
    ctx.translate(G.bunnyX + BODY_W/2, fy + SPR_H/2);
    ctx.rotate(20 * Math.PI / 180);
    ctx.drawImage(frame, -BODY_W/2, -SPR_H/2);
    ctx.restore();
  } else {
    ctx.drawImage(frame, G.bunnyX, fy);
  }

  ctx.fillStyle = INK;
  ctx.font = "bold 24px Consolas, monospace";
  ctx.fillText(`SCORE ${pad(G.score)}`, 16, 32);
  ctx.font = "16px Consolas, monospace";
  ctx.fillText(`BEST ${pad(best)}   SPEED ${G.speed.toFixed(1)}`, 16, 56);

  if (G.dead) {
    ctx.fillStyle = "rgba(0,0,0,.43)"; ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = "#fff"; ctx.textAlign = "center";
    ctx.font = "bold 48px Consolas, monospace";
    ctx.fillText("SPLAT!", W/2, 165);
    ctx.font = "bold 24px Consolas, monospace";
    ctx.fillText(`You ran ${Math.floor(G.score)} points`, W/2, 210);
    ctx.font = "16px Consolas, monospace";
    ctx.fillText("Press SPACE or TAP to run again", W/2, 245);
    ctx.textAlign = "left";
  }
}

function press() { G.dead ? reset() : jump(); }
addEventListener("keydown", e => {
  if (e.code === "Space" || e.code === "ArrowUp") { e.preventDefault(); press(); }
  if (e.code === "Escape") { best = 0; localStorage.removeItem("bunnyBest"); }
});
cv.addEventListener("pointerdown", press);

let last = performance.now();
function loop(now) {
  const dt = Math.min((now - last) / 1000, 0.05);
  last = now;
  update(dt);
  draw();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
</body>
</html>
